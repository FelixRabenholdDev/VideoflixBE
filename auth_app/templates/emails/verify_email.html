<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Confirm your email</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding:40px 40px 20px 40px;">
              <img src="{{ logo_url }}"
                alt="Videoflix"
                width="220"
                style="display:block;">
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:0 40px 30px 40px; color:#333333; font-size:15px; line-height:1.6;">
              <p style="margin:0 0 16px 0;">
                Dear <a href="mailto:{{ user.email }}" style="color:#4f46e5; text-decoration:none;">{{ user.email }}</a>,
              </p>
              <p style="margin:0 0 24px 0;">
                Thank you for registering with
                <a href="{{ frontend_url }}" style="color:#4f46e5; text-decoration:none;">Videoflix</a>.
                To complete your registration and verify your email address, please click the link below:
              </p>

              <!-- Button -->
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" bgcolor="#4338ca" style="border-radius:24px;">
                    <a href="{{ activation_link }}"
                       target="_blank"
                       style="display:inline-block; padding:14px 32px; font-size:15px; font-weight:bold; color:#ffffff; text-decoration:none; border-radius:24px;">
                      Activate account
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:30px 0 0 0;">
                If you did not create an account with us, please disregard this email.
              </p>

              <p style="margin:24px 0 0 0;">
                Best regards,<br>
                Your Videoflix Team.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
